apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fluent-bit
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fluent-bit-aws-services
subjects:
- kind: ServiceAccount
  name: fluent-bit-aws-services
roleRef:
  kind: Role
  name: fluent-bit
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fluent-bit-backend
subjects:
- kind: ServiceAccount
  name: fluent-bit-backend
roleRef:
  kind: Role
  name: fluent-bit
  apiGroup: rbac.authorization.k8s.io
