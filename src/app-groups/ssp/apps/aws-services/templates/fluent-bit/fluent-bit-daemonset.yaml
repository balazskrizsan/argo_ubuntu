apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-aws-services
  labels:
    app: fluent-bit-aws-services
spec:
  selector:
    matchLabels:
      app: fluent-bit-aws-services
  template:
    metadata:
      labels:
        app: fluent-bit-aws-services
    spec:
      serviceAccountName: fluent-bit-aws-services
      initContainers:
      - name: config-subst
        image: alpine:3.18
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache gettext
          export APP_NAME=$(cat /env-config/app_name)
          export ENV=$(cat /env-config/env)
          export LANGUAGE=$(cat /env-config/language)
          export LOGSTASH_HOST=$(cat /env-config/logstash_host)
          export LOGSTASH_PORT=$(cat /env-config/logstash_port)

          echo "APP_NAME: $APP_NAME"
          echo "ENV: $ENV"
          echo "LANGUAGE: $LANGUAGE"
          echo "LOGSTASH_HOST: $LOGSTASH_HOST"
          echo "LOGSTASH_PORT: $LOGSTASH_PORT"

          cp /fluent-bit-config-source/fluent-bit.conf /fluent-bit-config/fluent-bit.conf
          cp /fluent-bit-config-source/parsers.conf /fluent-bit-config/parsers.conf
          envsubst < /fluent-bit-config/fluent-bit.conf > /fluent-bit-config/fluent-bit.conf.tmp
          mv /fluent-bit-config/fluent-bit.conf.tmp /fluent-bit-config/fluent-bit.conf
        volumeMounts:
        - name: fluent-bit-config-source
          mountPath: /fluent-bit-config-source
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit-config
        - name: fluent-bit-env
          mountPath: /env-config
      containers:
      - name: fluent-bit-aws-services
        image: fluent/fluent-bit:2.2.0
        imagePullPolicy: Always
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: fluent-bit-config-source
        configMap:
          name: fluent-bit-config
      - name: fluent-bit-config
        emptyDir: {}
      - name: fluent-bit-env
        configMap:
          name: fluent-bit-env
