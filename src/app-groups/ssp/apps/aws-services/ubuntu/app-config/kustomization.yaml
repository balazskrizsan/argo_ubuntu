apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-prod

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: aws-services-config
    namespace: ssp-prod
    literals:
      - SERVER_SSL_ENABLED=false
      - SPRING_APPLICATION_ENV=PROD
      - OIDC_INTROSPECTION_URI=http://ids.ssp-local.svc.cluster.local:4043/connect/introspect
      - NATIVE_REFLECTION_CONFIGURATION_GENERATOR_ENABLED=false
      - LOGBACK_LOG_TYPE=JSON
      - LOGBACK_LOGSTASH_ENABLED=false
      - LOGBACK_LOGSTASH_FULL_HOST=
