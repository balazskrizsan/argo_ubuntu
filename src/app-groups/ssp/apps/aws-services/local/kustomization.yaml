apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-local

resources:
  - app-config
  - ../templates
  - ../templates/fluent-bit
  - ../../common/insecure-config

patches:
  - target: { group: "apps", version: "v1", kind: "Deployment", name: "aws-services" }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kbalazsworks/smart_scrum_poker_v2_aws_services:commit_sha_short_6401ea8

  - target: { group: "", version: "v1", kind: "Service", name: "aws-services" }
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer

      - op: replace
        path: /spec/ports/0/port
        value: 1234

  - target: { group: "networking.k8s.io",  version: "v1", kind: "Ingress", name: "aws-services" }
    patch: |-
      - op: replace
        path: /spec/rules/0/http/paths/0/backend/service/port/number
        value: 1234

      - op: replace
        path: /spec/rules/0/host
        value: api--aws-services--smartscrumpoker.localhost.balazskrizsan.com

      - op: replace
        path: /spec/tls/0/hosts
        value:
          - api--aws-services--smartscrumpoker.localhost.balazskrizsan.com

### Fluent Bit

  - target: { group: "", version: "v1", kind: "ConfigMap", name: "fluent-bit-env" }
    patch: |-
      - op: replace
        path: /data/app_name
        value: aws-services

      - op: replace
        path: /data/language
        value: java

  - target: { group: "", version: "v1", kind: "ConfigMap", name: "fluent-bit-config" }
    patch: |-
      - op: replace
        path: /data/fluent-bit.conf
        value: |-
          [SERVICE]
              Flush         1
              Log_Level     debug
              Daemon        off
              Parsers_File  parsers.conf

          [INPUT]
              Name              tail
              Path              /var/log/containers/*aws-services*.log
              Parser            docker
              Tag               aws-services.*
              Mem_Buf_Limit     5MB
              Skip_Long_Lines   On
              Refresh_Interval  5
              Read_from_Head    On

          [FILTER]
              Name                kubernetes
              Match               aws-services.*
              Kube_URL            https://kubernetes.default.svc:443
              Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
              Kube_Tag_Prefix     aws-services.var.log.containers.
              Merge_Log           On
              Keep_Log            Off
              K8S-Logging.Parser  On
              K8S-Logging.Exclude On

          [FILTER]
              Name                modify
              Match               aws-services.*
              Add                 env local
              Add                 app_name aws-services
              Add                 language java

          [OUTPUT]
              Name            tcp
              Match           aws-services.*
              Host            logstash.elk-local.svc.cluster.local
              Port            5044
              Format          json_lines
              json_date_key   @timestamp
              json_date_format iso8601
