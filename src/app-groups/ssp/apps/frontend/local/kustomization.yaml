apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-local

resources:
  - ../templates

patches:
  - target: { group: "apps",  version: "v1", kind: "Deployment", name: "frontend" }
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: kbalazsworks/smart_scrum_poker_v2_frontend:local_commit_sha_short_9c586cf

  - target: { group: "", version: "v1", kind: "Service", name: "frontend" }
    patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 4033

  - target: { group: "networking.k8s.io",  version: "v1", kind: "Ingress", name: "frontend" }
    patch: |-
      - op: replace
        path: /spec/rules/0/http/paths/0/backend/service/port/number
        value: 4033

      - op: replace
        path: /spec/rules/0/host
        value: smartscrumpoker.localhost.balazskrizsan.com

      - op: add
        path: /spec/tls
        value:
          - hosts:
              - smartscrumpoker.localhost.balazskrizsan.com
            secretName: env-cert
