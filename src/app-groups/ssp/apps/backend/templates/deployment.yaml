apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend-label
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      service: backend
  template:
    metadata:
      labels:
        app: backend-label
        service: backend
    spec:
      containers:
        - name: backend
          image: placeholder:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 200Mi
            limits:
              cpu: 400m
              memory: 400Mi
          envFrom:
            - configMapRef:
                name: backend-config
#            - secretRef:
#                name: backend-secrets
