apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fluent-bit-backend
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fluent-bit-backend
subjects:
- kind: ServiceAccount
  name: fluent-bit-backend
roleRef:
  kind: Role
  name: fluent-bit-backend
  apiGroup: rbac.authorization.k8s.io
