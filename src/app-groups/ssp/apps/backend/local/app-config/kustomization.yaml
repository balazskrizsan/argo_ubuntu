apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-local

resources:
  - ssp--backend--local--psql--persistent-volume.yaml
  - ssp--backend--local--psql--persistent-volume-claim.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: backend-config
    namespace: ssp-local
    literals:
      - NATIVE_REFLECTION_CONFIGURATION_GENERATOR_ENABLED=false
      - SERVER_ENV=LOCAL
      - SERVER_PORT=4003
      - SERVER_SOCKET_FULL_HOST=wss://localhost.balazskrizsan.com:3000/ws
      - SERVER_SSL_ENABLED=false
      - SERVER_SSL_KEY_STORE=classpath:keystore/certificate.p12
      - SERVER_SSL_KEY_STORE_PASSWORD=password
      - SITE_DOMAIN=not.yet
      - SITE_FRONTEND_HOST=https://localhost.balazskrizsan.com:3010/
      - SOCKET_IS_ENABLED_SOCKET_CONNECT_AND_DISCONNECT_LISTENERS=true
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=10
      - SPRING_DATASOURCE_PASSWORD=admin_pass
      - SPRING_DATASOURCE_URL=jdbc:postgresql://backend-psql-service:4013/smartscrumpoker
      - SPRING_DATASOURCE_USERNAME=admin
