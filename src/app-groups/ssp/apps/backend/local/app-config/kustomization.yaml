apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-local

resources:
  - ssp--backend--local--psql--persistent-volume.yaml
  - ssp--backend--local--psql--persistent-volume-claim.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: backend-config
    namespace: ssp-local
    literals:
      - NATIVE_REFLECTION_CONFIGURATION_GENERATOR_ENABLED=false
      - SERVER_ENV=LOCAL
      - SERVER_PORT=4003
      - SERVER_SOCKET_FULL_HOST=wss://api--smartscrumpoker.localhost.balazskrizsan.com/ws
      - SERVER_SSL_ENABLED=false
      - SERVER_SSL_KEY_STORE=classpath:keystore/certificate.p12
      - SERVER_SSL_KEY_STORE_PASSWORD=password
      - SITE_DOMAIN=smartscrumpoker.localhost.balazskrizsan.com
      - SITE_FRONTEND_HOST=https://smartscrumpoker.localhost.balazskrizsan.com/
      - SOCKET_IS_ENABLED_SOCKET_CONNECT_AND_DISCONNECT_LISTENERS=true
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=10
      - SPRING_DATASOURCE_PASSWORD=admin_pass
      - SPRING_DATASOURCE_URL=jdbc:postgresql://backend-psql-service:4013/app_db
      - SPRING_DATASOURCE_USERNAME=admin
      - LOGBACK_LOG_TYPE=COLOR_TEXT
      - LOGBACK_LOGSTASH_ENABLED=false
      - LOGBACK_LOGSTASH_FULL_HOST=
