apiVersion: v1
kind: PersistentVolume
metadata:
  name: ssp--backend--local--psql--persistent-volume
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: "/mnt/ssp/ssp__backend__local__psql__persistent_volume"
