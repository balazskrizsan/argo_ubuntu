# Prometheus configuration
server:
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
  
  persistentVolume:
    enabled: true
    storageClass: standard
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  retention: 30d

alertmanager:
  enabled: true
  
  persistentVolume:
    enabled: true
    storageClass: standard
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

nodeExporter:
  enabled: true
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

pushgateway:
  enabled: false

kubeStateMetrics:
  enabled: true
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
