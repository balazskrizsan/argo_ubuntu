    app: semantic-log-classifier-label
    service: semantic-log-classifier
spec:
  type: NodePort
  selector:
    app: semantic-log-classifier-label
    service: semantic-log-classifier
  ports:
    - name: http
      protocol: TCP
      port: 1111
      targetPort: 8080
