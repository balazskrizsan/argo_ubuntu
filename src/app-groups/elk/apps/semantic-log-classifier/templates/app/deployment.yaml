apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-log-classifier
  labels:
    app: semantic-log-classifier-label
spec:
  replicas: 1
  selector:
    matchLabels:
      service: semantic-log-classifier
  template:
    metadata:
      labels:
        app: semantic-log-classifier-label
        service: semantic-log-classifier
    spec:
      containers:
        - name: semantic-log-classifier
          image: placeholder:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
            limits:
              cpu: 800m
              memory: 2Gi
          env:
            - name: spring.profiles.active
              value: native
