apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ssp-local

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: fluent-bit-env
    namespace: ssp-local
    literals:
      - env=local
      - app=argo-cd
      - logstash_host=logstash.elk-local.svc.cluster.local
      - logstash_port=5044
