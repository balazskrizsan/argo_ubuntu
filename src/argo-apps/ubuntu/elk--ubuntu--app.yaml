apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elk--ubuntu--app
  namespace: argocd
spec:
  destination:
    namespace: elk
    server: https://kubernetes.default.svc
  project: default
  source:
    path: src/app-groups/elk/scripts/ubuntu
    repoURL: https://github.com/balazskrizsan/argo_ubuntu
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
