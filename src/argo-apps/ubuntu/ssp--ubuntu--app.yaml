apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ssp--ubuntu--app
  namespace: argocd
spec:
  destination:
    namespace: ssp-prod
    server: https://kubernetes.default.svc
  project: default
  source:
    path: src/app-groups/ssp/scripts/ubuntu_prod
    repoURL: https://github.com/balazskrizsan/argo_ubuntu
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
