apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster--ubuntu--app
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: src/app-groups/cluster/scripts/ubuntu
    repoURL: https://github.com/balazskrizsan/argo_ubuntu
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
